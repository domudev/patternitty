<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>patternity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  /* three distinct pastel hues, one per state — a small fixed scale with
     reserved meaning (not-yet-sure -> warming up -> confirmed), each still a
     wash rather than a saturated block, per the "area fill" spec. text stays
     in ink tokens throughout; the tint is the only thing carrying state.
     display labels (Noticed / Recurring / Adopted) are cosmetic only — the
     underlying `state` values (observed/suspect/proven) are unchanged, see
     patterns/_SCHEMA.md. */
  :root {
    --page: #f9f9f7;
    --surface-1: #fcfcfb;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --border: rgba(11,11,11,0.10);
    --radius: 10px;
    --observed-bg: hsl(210 60% 88%);  /* slate-blue: just spotted */
    --suspect-bg:  hsl(32 85% 80%);   /* amber: warming up */
    --proven-bg:   hsl(142 55% 80%);  /* green: confirmed */
  }
  /* dark "pastel" = desaturated + dark, not light+low-saturation (that
     would wash out against a light page, not a dark one) — re-stepped for
     the dark surface, not reused as-is. Applies on OS dark preference by
     default, or when the toggle below sets data-theme explicitly — either
     way is a real dark mode, not just an unstyled fallback. */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --page: #0d0d0d;
      --surface-1: #1a1a19;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --border: rgba(255,255,255,0.14);
      --observed-bg: hsl(210 40% 26%);
      --suspect-bg:  hsl(32 55% 28%);
      --proven-bg:   hsl(142 40% 24%);
    }
  }
  :root[data-theme="dark"] {
    --page: #0d0d0d;
    --surface-1: #1a1a19;
    --text-primary: #ffffff;
    --text-secondary: #c3c2b7;
    --text-muted: #898781;
    --border: rgba(255,255,255,0.14);
    --observed-bg: hsl(210 40% 26%);
    --suspect-bg:  hsl(32 55% 28%);
    --proven-bg:   hsl(142 40% 24%);
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: var(--page); color: var(--text-primary); }
  header { padding: 28px 32px 16px; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  /* handwriting accent on the title only — a data board still needs a plain
     legible sans everywhere else, this is a flourish, not the UI font. If
     the font fails to load (offline), 'cursive' is a reasonable fallback. */
  h1 { font-family: 'Caveat', cursive; font-size: 30px; margin: 0; font-weight: 600; line-height: 1; }
  .sub { color: var(--text-secondary); font-size: 13px; margin: 0; }
  .search { border: 1px solid var(--border); border-radius: 6px; background: var(--surface-1); color: var(--text-primary); padding: 7px 10px; font-size: 13px; min-width: 220px; font-family: inherit; }
  .search:focus { outline: 2px solid var(--text-muted); outline-offset: 2px; }
  .controls { display: flex; align-items: center; gap: 8px; }
  .theme-toggle { border: 1px solid var(--border); border-radius: 6px; background: var(--surface-1); color: var(--text-primary); width: 32px; height: 32px; font-size: 14px; cursor: pointer; }
  .theme-toggle:hover { background: var(--page); }
  .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 0 32px 32px; align-items: start; }
  @media (max-width: 720px) { .board { grid-template-columns: 1fr; } }
  .col { border-top: 2px solid var(--border); padding-top: 12px; }
  .col h2 { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin: 0 0 12px; }
  .col h2 .n { color: var(--text-muted); font-weight: 400; }
  .card { background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; cursor: pointer; outline: 2px solid transparent; outline-offset: 0; transition: outline-color .12s ease, outline-offset .12s ease; }
  .card:hover, .card:focus-visible { outline-color: var(--text-secondary); outline-offset: 4px; }
  @media (prefers-reduced-motion: no-preference) {
    .card { animation: rise-in .3s ease both; }
  }
  @keyframes rise-in { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
  .card.observed { background: var(--observed-bg); }
  .card.suspect { background: var(--suspect-bg); }
  .card.proven { background: var(--proven-bg); }
  .card .top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .card .name { font-weight: 600; font-size: 14px; }
  .chip { font-size: 10px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--text-secondary); text-transform: uppercase; letter-spacing: .03em; background: rgba(11,11,11,0.03); }
  .card .why { font-size: 12.5px; color: var(--text-secondary); margin-top: 6px; line-height: 1.4; }
  .card .foot { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .card .scope { font-size: 11px; color: var(--text-muted); }
  .dots { display: flex; gap: 3px; }
  .dots .p { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); opacity: .35; }
  .dots .p.on { opacity: 1; }
  /* solid, not a tinted overlay — a translucent color reads differently on
     each of the three state backgrounds, so it can't be legible on all of
     them at once; a fixed solid/inverse pair always contrasts regardless
     of the card underneath. */
  .badge { font-size: 10.5px; font-weight: 600; padding: 3px 9px; border-radius: 999px; background: var(--text-primary); color: var(--surface-1); }
  .empty { color: var(--text-muted); font-size: 12px; font-style: italic; }
  .more { display: block; width: 100%; margin-top: 4px; padding: 8px; border: 1px dashed var(--border); border-radius: 6px; background: none; color: var(--text-secondary); font-size: 12px; font-family: inherit; cursor: pointer; }
  .more:hover { background: var(--surface-1); }
  .profile { margin: 0 32px 8px; padding: 16px 20px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface-1); }
  .profile h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--text-muted); margin: 14px 0 4px; }
  .profile h3:first-child { margin-top: 0; }
  .profile p, .profile li { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin: 2px 0; }
  .profile ul { margin: 4px 0; padding-left: 18px; }

  dialog#detail { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface-1); color: var(--text-primary); padding: 22px 26px; width: min(480px, 90vw); }
  dialog#detail::backdrop { background: rgba(0,0,0,0.35); }
  dialog#detail .dtop { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  dialog#detail h2 { font-size: 16px; margin: 0; }
  dialog#detail .close { border: none; background: none; color: var(--text-muted); font-size: 18px; cursor: pointer; line-height: 1; padding: 4px; }
  dialog#detail .row { margin-top: 14px; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .03em; }
  dialog#detail .body { font-size: 13.5px; color: var(--text-secondary); line-height: 1.5; margin-top: 4px; white-space: pre-wrap; }
  dialog#detail .chips { margin-top: 14px; display: flex; gap: 6px; flex-wrap: wrap; }
</style>
</head>
<body>
<header>
  <div>
    <h1>patternity</h1>
    <p class="sub">what it's noticed about how you work, from first sighting to something it now assumes.</p>
  </div>
  <div class="controls">
    <input class="search" id="search" type="search" placeholder="search patterns…" autocomplete="off">
    <button class="theme-toggle" id="theme-toggle" aria-label="toggle dark mode" title="toggle dark mode"></button>
  </div>
</header>
<div class="profile" id="profile" hidden></div>
<div class="board" id="board">
  <div class="col" data-state="observed"><h2>Noticed <span class="n"></span></h2><div class="cards"></div></div>
  <div class="col" data-state="suspect"><h2>Recurring <span class="n"></span></h2><div class="cards"></div></div>
  <div class="col" data-state="proven"><h2>Adopted <span class="n"></span></h2><div class="cards"></div></div>
</div>
<dialog id="detail">
  <div class="dtop"><h2 id="d-name"></h2><button class="close" id="d-close" aria-label="close">✕</button></div>
  <div class="row">Why</div>
  <div class="body" id="d-body"></div>
  <div class="row" id="d-target-row" hidden>Overrides</div>
  <div class="body" id="d-target" hidden></div>
  <div class="chips" id="d-chips"></div>
</dialog>
<script id="patternity-data" type="application/json">/*__PATTERNITY_DATA__*/</script>
<script id="patternity-profile" type="application/json">/*__PATTERNITY_PROFILE__*/</script>
<script>
  const DATA = JSON.parse(document.getElementById('patternity-data').textContent || '[]');
  const PROFILE_MD = JSON.parse(document.getElementById('patternity-profile').textContent || '""');
  const PAGE_SIZE = 6;
  const shown = { observed: PAGE_SIZE, suspect: PAGE_SIZE, proven: PAGE_SIZE };
  let query = '';

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function matches(p, q) {
    if (!q) return true;
    const at = p.applies_to || {};
    const haystack = [p.name, p.body, p.type, p.cluster, at.tool, at.project].filter(Boolean).join(' ').toLowerCase();
    return haystack.includes(q);
  }

  const STATE_LABEL = { observed: 'Noticed', suspect: 'Recurring', proven: 'Adopted' };

  function card(p, index, delayStep) {
    const occ = Math.min(parseInt(p.occurrences, 10) || 0, 3);
    const dots = [1, 2, 3].map(i => `<span class="p${i <= occ ? ' on' : ''}"></span>`).join('');
    const at = p.applies_to || {};
    const scope = [at.tool, at.project].filter(x => x && x !== '*').join(' · ') || 'everywhere';
    const badge = p.type === 'override' ? '<span class="badge">overrides another rule</span>' : '';
    const why = (p.body || '').split('\n').find(l => l.trim()) || '';
    const tag = p.cluster ? `<span class="chip">${escapeHtml(p.cluster)}</span>` : '';
    return `<div class="card ${p.state}" data-index="${index}" tabindex="0" style="animation-delay:${delayStep * 30}ms">
      <div class="top"><span class="name">${escapeHtml(p.name)}</span>${tag}</div>
      <div class="why">${escapeHtml(why)}</div>
      <div class="foot">
        <span class="scope">${escapeHtml(scope)}</span>
        ${badge || `<span class="dots">${dots}</span>`}
      </div>
    </div>`;
  }

  function render() {
    const q = query.trim().toLowerCase();
    document.querySelectorAll('.col').forEach(col => {
      const state = col.dataset.state;
      const items = DATA.filter(p => p.state === state && matches(p, q));
      col.querySelector('h2 .n').textContent = items.length;
      const visible = items.slice(0, shown[state]);
      const cardsHtml = visible.length
        ? visible.map((p, i) => card(p, DATA.indexOf(p), i)).join('')
        : '<div class="empty">nothing here yet</div>';
      const moreHtml = items.length > visible.length
        ? `<button class="more" data-state="${state}">show ${Math.min(PAGE_SIZE, items.length - visible.length)} more (${items.length - visible.length} left)</button>`
        : '';
      col.querySelector('.cards').innerHTML = cardsHtml + moreHtml;
    });
    document.querySelectorAll('.more').forEach(btn => {
      btn.addEventListener('click', () => { shown[btn.dataset.state] += PAGE_SIZE; render(); });
    });
    document.querySelectorAll('.card').forEach(el => {
      const open = () => openDetail(DATA[parseInt(el.dataset.index, 10)]);
      el.addEventListener('click', open);
      el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } });
    });
  }

  document.getElementById('search').addEventListener('input', e => {
    query = e.target.value;
    Object.keys(shown).forEach(k => shown[k] = PAGE_SIZE);
    render();
  });

  // tiny markdown-ish renderer for PROFILE.md — the skill only ever writes
  // "## heading" + "- bullet" + prose lines (see _SCHEMA.md), so this is
  // deliberately not a general markdown parser, just enough for that shape.
  function renderProfile(md) {
    const panel = document.getElementById('profile');
    const lines = (md || '').split('\n');
    let html = '', inList = false;
    for (const raw of lines) {
      const line = raw.trim();
      if (line.startsWith('## ')) {
        if (inList) { html += '</ul>'; inList = false; }
        html += `<h3>${escapeHtml(line.slice(3))}</h3>`;
      } else if (line.startsWith('- ')) {
        if (!inList) { html += '<ul>'; inList = true; }
        html += `<li>${escapeHtml(line.slice(2))}</li>`;
      } else if (line) {
        if (inList) { html += '</ul>'; inList = false; }
        html += `<p>${escapeHtml(line)}</p>`;
      }
    }
    if (inList) html += '</ul>';
    panel.innerHTML = html;
    panel.hidden = !html;
  }

  const detail = document.getElementById('detail');
  function openDetail(p) {
    document.getElementById('d-name').textContent = p.name;
    document.getElementById('d-body').textContent = p.body || '';
    const at = p.applies_to || {};
    const scope = [at.tool, at.project, at.glob].filter(x => x && x !== '*').join(' · ') || 'everywhere';
    const hasTarget = p.type === 'override' && p.target && p.target !== 'null';
    document.getElementById('d-target-row').hidden = !hasTarget;
    const targetEl = document.getElementById('d-target');
    targetEl.hidden = !hasTarget;
    targetEl.textContent = hasTarget ? p.target : '';
    document.getElementById('d-chips').innerHTML = [
      STATE_LABEL[p.state] || p.state,
      p.cluster,
      `${p.occurrences || 0} occurrence${p.occurrences == 1 ? '' : 's'}`,
      scope,
    ].filter(Boolean).map(c => `<span class="chip">${escapeHtml(c)}</span>`).join('');
    detail.showModal();
  }
  document.getElementById('d-close').addEventListener('click', () => detail.close());
  detail.addEventListener('click', e => { if (e.target === detail) detail.close(); });

  // explicit toggle, persisted — don't just rely on OS preference, which is
  // invisible unless someone already has it set and knows to look for it.
  const THEME_KEY = 'patternity-theme';
  const themeBtn = document.getElementById('theme-toggle');
  function currentTheme() {
    return document.documentElement.getAttribute('data-theme')
      || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  }
  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem(THEME_KEY, theme);
    themeBtn.textContent = theme === 'dark' ? '☀' : '🌙';
  }
  themeBtn.addEventListener('click', () => setTheme(currentTheme() === 'dark' ? 'light' : 'dark'));
  setTheme(localStorage.getItem(THEME_KEY) || currentTheme());

  renderProfile(PROFILE_MD);
  render();
</script>
</body>
</html>
