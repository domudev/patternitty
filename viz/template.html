<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>patternity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* Dark-only, no light theme. State is carried by a crisp accent (left bar +
     glow + dot), NOT a full-card tint — low-opacity washes on a near-black
     surface always read muddy, so cards share one neutral elevated surface and
     the accent does the identity work. Accents: slate (observed, still unsure)
     -> amber (suspect, building) -> green (proven, confident, vivid). override
     gets a fourth reserved hue (violet) so it never impersonates a state. */
  :root {
    --page: #0b0b0e;
    --card: #17171c;
    --card-hover: #1d1d23;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --text-primary: #f4f4f5;
    --text-secondary: #a1a1aa;
    --text-muted: #71717a;
    --radius: 12px;

    --observed: #8b95a7;   /* slate */
    --suspect:  #f4b740;   /* amber */
    --proven:   #3ddc84;   /* green */
    --override: #a78bfa;   /* violet, override only */

    --font-sans: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
    --font-hand: 'Caveat', cursive;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-sans);
    color: var(--text-primary);
    background:
      radial-gradient(900px 500px at 18% -8%, rgba(97,110,150,0.12), transparent 60%),
      var(--page);
    background-attachment: fixed;
    min-height: 100vh;
  }
  header { padding: 34px 34px 18px; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  h1 { font-family: var(--font-hand); font-size: 40px; margin: 0; font-weight: 700; line-height: .9; }
  .sub { color: var(--text-secondary); font-size: 13.5px; margin: 6px 0 0; max-width: 46ch; }
  .search {
    border: 1px solid var(--border); border-radius: 8px; background: var(--card);
    color: var(--text-primary); padding: 9px 12px; font-size: 13px; min-width: 230px; font-family: inherit;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .search::placeholder { color: var(--text-muted); }
  .search:focus { outline: none; border-color: var(--border-strong); box-shadow: 0 0 0 3px rgba(255,255,255,0.06); }

  .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; padding: 6px 34px 40px; align-items: start; }
  @media (max-width: 760px) { .board { grid-template-columns: 1fr; } }

  .col { --accent: var(--text-muted); }
  .col[data-state="observed"] { --accent: var(--observed); }
  .col[data-state="suspect"]  { --accent: var(--suspect); }
  .col[data-state="proven"]   { --accent: var(--proven); }
  .col h2 {
    font-family: var(--font-hand); font-size: 24px; font-weight: 700; color: var(--text-primary);
    margin: 0 0 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 9px;
  }
  .col h2::before { content: ""; width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
  .col h2 .n {
    font-family: var(--font-sans); font-size: 11px; font-weight: 600; color: var(--text-secondary);
    background: rgba(255,255,255,0.06); border-radius: 999px; padding: 2px 8px; margin-left: auto;
  }

  .card {
    --accent: var(--text-muted);
    position: relative; background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 15px 17px 15px 19px; margin-bottom: 10px; cursor: pointer;
    overflow: hidden;
    transition: transform .14s ease, border-color .14s ease, background .14s ease, box-shadow .14s ease;
  }
  .card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .card.observed { --accent: var(--observed); }
  .card.suspect  { --accent: var(--suspect); }
  .card.proven   { --accent: var(--proven); }
  .card:hover, .card:focus-visible {
    outline: none; transform: translateY(-2px); background: var(--card-hover);
    border-color: color-mix(in srgb, var(--accent) 45%, var(--border-strong));
    box-shadow: 0 8px 26px rgba(0,0,0,0.45);
  }
  @media (prefers-reduced-motion: no-preference) {
    .card { animation: rise-in .34s cubic-bezier(.2,.7,.3,1) both; }
  }
  @keyframes rise-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .card .top { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .card .name { font-family: var(--font-hand); font-weight: 700; font-size: 22px; line-height: 1; }
  .card .why { font-size: 12.5px; color: var(--text-secondary); margin-top: 8px; line-height: 1.45; }
  .card .foot { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
  .card .scope { font-size: 11px; color: var(--text-muted); }

  .chip {
    font-size: 10px; padding: 3px 8px; border-radius: 999px; border: 1px solid var(--border);
    color: var(--text-secondary); text-transform: uppercase; letter-spacing: .04em; background: rgba(255,255,255,0.05); white-space: nowrap;
  }
  .chip.cluster {
    font-family: var(--font-hand); font-size: 15px; font-weight: 600; text-transform: none; letter-spacing: 0; padding: 0 9px;
    color: var(--accent, var(--text-secondary)); border-color: color-mix(in srgb, var(--accent, var(--border)) 35%, transparent);
    background: color-mix(in srgb, var(--accent, transparent) 12%, transparent);
  }
  .dots { display: flex; gap: 4px; align-items: center; }
  .dots .p { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); opacity: .3; }
  .dots .p.on { background: var(--accent); opacity: 1; box-shadow: 0 0 6px var(--accent); }
  .badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 999px; background: var(--override); color: #14101f; text-transform: uppercase; letter-spacing: .04em; }

  .empty { color: var(--text-muted); font-size: 12px; font-style: italic; padding: 4px 2px; }
  .more {
    display: block; width: 100%; margin-top: 2px; padding: 9px; border: 1px dashed var(--border); border-radius: 8px;
    background: none; color: var(--text-secondary); font-size: 12px; font-family: inherit; cursor: pointer; transition: background .14s, border-color .14s;
  }
  .more:hover { background: rgba(255,255,255,0.04); border-color: var(--border-strong); }

  .profile {
    margin: 0 34px 14px; padding: 18px 22px; border: 1px solid var(--border); border-radius: var(--radius);
    background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent), var(--card);
  }
  .profile h3 { font-family: var(--font-hand); font-size: 22px; font-weight: 700; color: var(--text-primary); margin: 16px 0 3px; }
  .profile h3:first-child { margin-top: 0; }
  .profile p, .profile li { font-size: 13px; color: var(--text-secondary); line-height: 1.55; margin: 2px 0; }
  .profile ul { margin: 4px 0; padding-left: 18px; }

  dialog#detail {
    border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--card);
    color: var(--text-primary); padding: 24px 28px; width: min(500px, 92vw);
    box-shadow: 0 24px 70px rgba(0,0,0,0.6);
  }
  dialog#detail[open] { animation: pop-in .18s ease both; }
  @keyframes pop-in { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: none; } }
  dialog#detail::backdrop { background: rgba(0,0,0,0.55); backdrop-filter: blur(2px); }
  dialog#detail .dtop { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  dialog#detail h2 { font-family: var(--font-hand); font-size: 28px; font-weight: 700; margin: 0; }
  dialog#detail .close { border: none; background: none; color: var(--text-muted); font-size: 18px; cursor: pointer; line-height: 1; padding: 4px; transition: color .12s; }
  dialog#detail .close:hover { color: var(--text-primary); }
  dialog#detail .row { margin-top: 16px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
  dialog#detail .body { font-size: 13.5px; color: var(--text-secondary); line-height: 1.55; margin-top: 5px; white-space: pre-wrap; }
  dialog#detail .chips { margin-top: 18px; display: flex; gap: 7px; flex-wrap: wrap; }
</style>
</head>
<body>
<header>
  <div>
    <h1>patternity</h1>
    <p class="sub">what it's noticed about how you work, from first sighting to something it now assumes.</p>
  </div>
  <input class="search" id="search" type="search" placeholder="search patterns…" autocomplete="off">
</header>
<div class="profile" id="profile" hidden></div>
<div class="board" id="board">
  <div class="col" data-state="observed"><h2>Noticed <span class="n"></span></h2><div class="cards"></div></div>
  <div class="col" data-state="suspect"><h2>Recurring <span class="n"></span></h2><div class="cards"></div></div>
  <div class="col" data-state="proven"><h2>Adopted <span class="n"></span></h2><div class="cards"></div></div>
</div>
<dialog id="detail">
  <div class="dtop"><h2 id="d-name"></h2><button class="close" id="d-close" aria-label="close">✕</button></div>
  <div class="row">Why</div>
  <div class="body" id="d-body"></div>
  <div class="row" id="d-target-row" hidden>Overrides</div>
  <div class="body" id="d-target" hidden></div>
  <div class="chips" id="d-chips"></div>
</dialog>
<script id="patternity-data" type="application/json">/*__PATTERNITY_DATA__*/</script>
<script id="patternity-profile" type="application/json">/*__PATTERNITY_PROFILE__*/</script>
<script>
  const DATA = JSON.parse(document.getElementById('patternity-data').textContent || '[]');
  const PROFILE_MD = JSON.parse(document.getElementById('patternity-profile').textContent || '""');
  const PAGE_SIZE = 6;
  const shown = { observed: PAGE_SIZE, suspect: PAGE_SIZE, proven: PAGE_SIZE };
  let query = '';

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function matches(p, q) {
    if (!q) return true;
    const at = p.applies_to || {};
    const haystack = [p.name, p.body, p.type, p.cluster, at.tool, at.project].filter(Boolean).join(' ').toLowerCase();
    return haystack.includes(q);
  }

  const STATE_LABEL = { observed: 'Noticed', suspect: 'Recurring', proven: 'Adopted' };

  function card(p, index, delayStep) {
    const occ = Math.min(parseInt(p.occurrences, 10) || 0, 3);
    const dots = [1, 2, 3].map(i => `<span class="p${i <= occ ? ' on' : ''}"></span>`).join('');
    const at = p.applies_to || {};
    const scope = [at.tool, at.project].filter(x => x && x !== '*').join(' · ') || 'everywhere';
    const badge = p.type === 'override' ? '<span class="badge">override</span>' : '';
    const why = (p.body || '').split('\n').find(l => l.trim()) || '';
    const tag = p.cluster ? `<span class="chip cluster">${escapeHtml(p.cluster)}</span>` : '';
    return `<div class="card ${p.state}" data-index="${index}" tabindex="0" style="animation-delay:${delayStep * 35}ms">
      <div class="top"><span class="name">${escapeHtml(p.name)}</span>${tag}</div>
      <div class="why">${escapeHtml(why)}</div>
      <div class="foot">
        <span class="scope">${escapeHtml(scope)}</span>
        ${badge || `<span class="dots">${dots}</span>`}
      </div>
    </div>`;
  }

  function render() {
    const q = query.trim().toLowerCase();
    document.querySelectorAll('.col').forEach(col => {
      const state = col.dataset.state;
      const items = DATA.filter(p => p.state === state && matches(p, q));
      col.querySelector('h2 .n').textContent = items.length;
      const visible = items.slice(0, shown[state]);
      const cardsHtml = visible.length
        ? visible.map((p, i) => card(p, DATA.indexOf(p), i)).join('')
        : '<div class="empty">nothing here yet</div>';
      const moreHtml = items.length > visible.length
        ? `<button class="more" data-state="${state}">show ${Math.min(PAGE_SIZE, items.length - visible.length)} more (${items.length - visible.length} left)</button>`
        : '';
      col.querySelector('.cards').innerHTML = cardsHtml + moreHtml;
    });
    document.querySelectorAll('.more').forEach(btn => {
      btn.addEventListener('click', () => { shown[btn.dataset.state] += PAGE_SIZE; render(); });
    });
    document.querySelectorAll('.card').forEach(el => {
      const open = () => openDetail(DATA[parseInt(el.dataset.index, 10)]);
      el.addEventListener('click', open);
      el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } });
    });
  }

  document.getElementById('search').addEventListener('input', e => {
    query = e.target.value;
    Object.keys(shown).forEach(k => shown[k] = PAGE_SIZE);
    render();
  });

  // tiny markdown-ish renderer for PROFILE.md — the skill only ever writes
  // "## heading" + "- bullet" + prose lines (see _SCHEMA.md), so this is
  // deliberately not a general markdown parser, just enough for that shape.
  function renderProfile(md) {
    const panel = document.getElementById('profile');
    const lines = (md || '').split('\n');
    let html = '', inList = false;
    for (const raw of lines) {
      const line = raw.trim();
      if (line.startsWith('## ')) {
        if (inList) { html += '</ul>'; inList = false; }
        html += `<h3>${escapeHtml(line.slice(3))}</h3>`;
      } else if (line.startsWith('- ')) {
        if (!inList) { html += '<ul>'; inList = true; }
        html += `<li>${escapeHtml(line.slice(2))}</li>`;
      } else if (line) {
        if (inList) { html += '</ul>'; inList = false; }
        html += `<p>${escapeHtml(line)}</p>`;
      }
    }
    if (inList) html += '</ul>';
    panel.innerHTML = html;
    panel.hidden = !html;
  }

  const detail = document.getElementById('detail');
  function openDetail(p) {
    document.getElementById('d-name').textContent = p.name;
    document.getElementById('d-body').textContent = p.body || '';
    const at = p.applies_to || {};
    const scope = [at.tool, at.project, at.glob].filter(x => x && x !== '*').join(' · ') || 'everywhere';
    const hasTarget = p.type === 'override' && p.target && p.target !== 'null';
    document.getElementById('d-target-row').hidden = !hasTarget;
    const targetEl = document.getElementById('d-target');
    targetEl.hidden = !hasTarget;
    targetEl.textContent = hasTarget ? p.target : '';
    document.getElementById('d-chips').innerHTML = [
      [STATE_LABEL[p.state] || p.state, false],
      [p.cluster, true],
      [`${p.occurrences || 0} occurrence${p.occurrences == 1 ? '' : 's'}`, false],
      [scope, false],
    ].filter(([text]) => Boolean(text))
      .map(([text, isCluster]) => `<span class="chip${isCluster ? ' cluster' : ''}">${escapeHtml(text)}</span>`)
      .join('');
    detail.showModal();
  }
  document.getElementById('d-close').addEventListener('click', () => detail.close());
  detail.addEventListener('click', e => { if (e.target === detail) detail.close(); });

  renderProfile(PROFILE_MD);
  render();
</script>
</body>
</html>
