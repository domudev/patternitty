name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run self-checks
        run: |
          for t in tests/test_*.py; do
            echo "== $t =="
            uv run "$t"
          done
