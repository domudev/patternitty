name: pr-title

# Enforce Conventional Commits on the PR title. With squash-merge, the PR
# title becomes the commit on main — which is what release-please parses to
# decide the version bump and changelog. So gating the title is enough.
on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
